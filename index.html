<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор Игры "Найди Определение"</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            gap: 20px;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .editor, .preview {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input[type="text"], input[type="url"], textarea {
            width: 95%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        textarea {
            height: 150px;
            resize: vertical;
        }
        .color-inputs { display: flex; gap: 20px; align-items: center; }
        input[type="color"] {
            width: 50px;
            height: 50px;
            border: none;
            padding: 0;
            cursor: pointer;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #output-code {
            height: 200px;
            font-family: monospace;
            white-space: pre;
            background-color: #2d2d2d;
            color: #f1f1f1;
        }
        #preview-container {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .help-text {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="editor">
        <h1>Редактор Игры</h1>

        <h2>1. Настройки внешнего вида</h2>
        <div class="color-inputs">
            <div>
                <label for="bg-color">Цвет фона:</label>
                <input type="color" id="bg-color" value="#f0f8ff">
            </div>
            <div>
                <label for="btn-color">Цвет кнопок:</label>
                <input type="color" id="btn-color" value="#4CAF50">
            </div>
        </div>

        <label for="img-url">Ссылка на изображение:</label>
        <input type="url" id="img-url" placeholder="https://example.com/image.jpg" value="https://i.ibb.co/L5hP9Vj/plant.png">
        
        <h2>2. Содержимое игры</h2>
        <label for="game-data">Дефиниции и ответы:</label>
        <div class="help-text">
            Каждая строка — один раунд. Формат: <br>
            <b>Вопрос? | Правильный ответ, Вариант 2, Вариант 3</b>
        </div>
        <textarea id="game-data" placeholder="Пример: Столица Франции? | Париж, Лондон, Берлин">Что отвечает за фотосинтез в клетках растений? | Хлорофилл, Митохондрия, Ядро
Самая большая планета в Солнечной системе? | Юпитер, Сатурн, Земля</textarea>

        <h2>3. Обратная связь</h2>
        <label for="feedback-correct">Текст при верном ответе:</label>
        <input type="text" id="feedback-correct" value="Верно! Отлично!">
        
        <label for="feedback-incorrect">Текст при неверном ответе:</label>
        <input type="text" id="feedback-incorrect" value="Попробуй еще раз.">
        
        <label for="feedback-final">Текст по завершении игры:</label>
        <input type="text" id="feedback-final" value="Игра окончена! Вы молодец!">

        <button id="generate-btn">Сгенерировать код и обновить превью</button>

        <h2>4. Готовый код</h2>
        <label for="output-iframe">Код для вставки на сайт (iframe):</label>
        <textarea id="output-iframe" readonly></textarea>
        
        <label for="output-code">Полный HTML-код игры:</label>
        <textarea id="output-code" readonly></textarea>
    </div>

    <div class="preview">
        <h1>Превью Игры</h1>
        <iframe id="preview-container" title="Превью игры"></iframe>
    </div>

<script>
    // --- Элементы управления редактора ---
    const bgColorInput = document.getElementById('bg-color');
    const btnColorInput = document.getElementById('btn-color');
    const imgUrlInput = document.getElementById('img-url');
    const gameDataInput = document.getElementById('game-data');
    const correctFeedbackInput = document.getElementById('feedback-correct');
    const incorrectFeedbackInput = document.getElementById('feedback-incorrect');
    const finalFeedbackInput = document.getElementById('feedback-final');
    const generateBtn = document.getElementById('generate-btn');
    const outputCodeTextarea = document.getElementById('output-code');
    const outputIframeTextarea = document.getElementById('output-iframe');
    const previewFrame = document.getElementById('preview-container');

    // --- Функция генерации ---
    function generateGame() {
        // 1. Сбор данных из полей редактора
        const bgColor = bgColorInput.value;
        const btnColor = btnColorInput.value;
        const imgUrl = imgUrlInput.value;
        const correctFeedback = correctFeedbackInput.value;
        const incorrectFeedback = incorrectFeedbackInput.value;
        const finalFeedback = finalFeedbackInput.value;

        // 2. Парсинг данных игры
        const gameDataRaw = gameDataInput.value.trim().split('\n');
        const gameData = gameDataRaw.map(line => {
            if (!line.includes('|')) return null;
            const [definition, optionsStr] = line.split('|');
            const options = optionsStr.split(',').map(opt => opt.trim());
            return {
                definition: definition.trim(),
                options: options, // Ответы в том порядке, как введены
                answer: options[0] // Первый ответ всегда правильный
            };
        }).filter(item => item !== null); // Убираем пустые/неверные строки

        // 3. Создание HTML-шаблона игры с подстановкой данных
        const gameTemplate = `
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивная игра</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: ${bgColor};
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }
        img {
            max-width: 100%;
            height: auto;
            max-height: 200px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .definition {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            padding: 15px;
            border: none;
            border-radius: 5px;
            background-color: ${btnColor};
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .option:hover {
            transform: scale(1.02);
        }
        .option.correct {
            background-color: #28a745;
        }
        .option.incorrect {
            background-color: #dc3545;
        }
        #feedback {
            margin-top: 20px;
            font-size: 1.1em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="${imgUrl}" alt="Game Image">
        <p class="definition"></p>
        <div class="options"></div>
        <p id="feedback"></p>
    </div>

    <script>
        const gameData = ${JSON.stringify(gameData, null, 2)};

        const definitionEl = document.querySelector('.definition');
        const optionsEl = document.querySelector('.options');
        const feedbackEl = document.getElementById('feedback');
        
        let currentQuestionIndex = 0;

        function loadQuestion() {
            if (currentQuestionIndex >= gameData.length) {
                definitionEl.textContent = "${finalFeedback}";
                optionsEl.innerHTML = '';
                feedbackEl.textContent = '';
                return;
            }

            const currentQuestion = gameData[currentQuestionIndex];
            definitionEl.textContent = currentQuestion.definition;
            optionsEl.innerHTML = '';
            feedbackEl.textContent = '';

            // Перемешиваем варианты ответов
            const shuffledOptions = [...currentQuestion.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(optionText => {
                const button = document.createElement('button');
                button.textContent = optionText;
                button.classList.add('option');
                button.addEventListener('click', () => checkAnswer(optionText, button));
                optionsEl.appendChild(button);
            });
        }

        function checkAnswer(selectedOption, button) {
            const correctAnswer = gameData[currentQuestionIndex].answer;
            const allButtons = optionsEl.querySelectorAll('.option');
            
            allButtons.forEach(btn => btn.disabled = true); // Блокируем кнопки после ответа

            if (selectedOption === correctAnswer) {
                feedbackEl.textContent = "${correctFeedback}";
                feedbackEl.style.color = 'green';
                button.classList.add('correct');
                
                setTimeout(() => {
                    currentQuestionIndex++;
                    loadQuestion();
                }, 1500);

            } else {
                feedbackEl.textContent = "${incorrectFeedback}";
                feedbackEl.style.color = 'red';
                button.classList.add('incorrect');
                
                // Показываем правильный ответ
                allButtons.forEach(btn => {
                    if (btn.textContent === correctAnswer) {
                        btn.classList.add('correct');
                    }
                });

                setTimeout(() => {
                    // Не переходим к следующему вопросу, а перезагружаем текущий
                    loadQuestion();
                }, 2000);
            }
        }

        loadQuestion();
    <\/script>
</body>
</html>
        `;

        // 4. Вывод результатов
        outputCodeTextarea.value = gameTemplate.trim();
        const iframeCode = `<iframe srcdoc="${gameTemplate.replace(/"/g, '&quot;')}" width="100%" height="600" style="border:none;"></iframe>`;
        outputIframeTextarea.value = iframeCode;

        // 5. Обновление превью
        previewFrame.srcdoc = gameTemplate;
    }

    // --- Назначение событий ---
    generateBtn.addEventListener('click', generateGame);

    // --- Первичная генерация при загрузке страницы ---
    window.addEventListener('load', generateGame);
</script>

</body>
</html>
